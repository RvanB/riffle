site_name: Riffle
site_description: Page-turning book viewer with show-through translucency.
site_url: https://rifflejs.readthedocs.io/
repo_url: https://github.com/RvanB/riffle.js
repo_name: RvanB/riffle.js
edit_uri: edit/main/docs/

docs_dir: docs

exclude_docs: |
  requirements.txt

theme:
  name: material
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - content.code.copy
    - content.action.edit
    - search.highlight
    - search.suggest
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true

nav:
  - Home: index.md
  - Quick Start: quickstart.md
  - API Reference:
      - Overview: api/index.md
      - Riffle: api/Riffle.md
      - RifflePageStrip: api/RifflePageStrip.md
      - BookViewer: api/BookViewer.md
      - Sources:
          - ImagePageSource: api/sources/ImagePageSource.md
      - Loading:
          - downscaleCanvas: api/loading/downscaleCanvas.md
          - imageLoader: api/loading/imageLoader.md
          - pdfLoader: api/loading/pdfLoader.md
          - paper: api/model/paper.md
      - Rendering:
          - layout: api/rendering/layout.md
