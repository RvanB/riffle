<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Riffle — standalone PDF demo</title>
    <style>
      * { box-sizing: border-box; }
      html, body { margin: 0; padding: 0; height: 100%; }
      body {
          display: flex;
          flex-direction: column;
          font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
          background: #1e1e1e;
          color: #ddd;
      }
      header {
          display: flex;
          align-items: center;
          gap: 16px;
          padding: 10px 16px;
          background: #111;
          border-bottom: 1px solid #333;
      }
      .file-picker {
          display: inline-flex;
          align-items: center;
          gap: 8px;
          cursor: pointer;
          background: #2a2a2a;
          padding: 6px 12px;
          border-radius: 4px;
          border: 1px solid #444;
      }
      .file-picker input { display: none; }
      .file-picker:hover { background: #333; }
      .demo-control {
          display: inline-flex;
          align-items: center;
          gap: 6px;
          color: #aaa;
          font-size: 13px;
      }
      .demo-control input[type="checkbox"] { margin: 0; }
      #page-jump {
          display: flex;
          align-items: center;
          gap: 6px;
          color: #888;
          font-size: 13px;
      }
      #page-input {
          width: 56px;
          background: #2a2a2a;
          color: #ddd;
          border: 1px solid #444;
          border-radius: 4px;
          padding: 4px 6px;
          font: inherit;
          text-align: right;
      }
      #page-input::-webkit-outer-spin-button,
      #page-input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
      #page-input { -moz-appearance: textfield; }
      .zoom-controls { margin-left: auto; display: flex; gap: 4px; }
      .zoom-controls button {
          width: 32px; height: 32px;
          background: #2a2a2a; color: #ddd;
          border: 1px solid #444; border-radius: 4px;
          font-size: 18px; cursor: pointer;
      }
      .zoom-controls button:hover { background: #333; }

      /* This is the demo's choice of layout for the Riffle canvas + page strip. */
      #viewport {
          flex: 1;
          overflow: auto;
          display: flex;
          justify-content: center;
          align-items: center;
          padding: 32px;
      }
      #viewport canvas {
          box-shadow: 0 10px 24px rgba(0, 0, 0, 0.26);
      }
      #strip-container {
          flex: 0 0 64px;
          background: #161616;
          border-top: 1px solid #333;
          overflow: hidden;
          display: flex;
          align-items: center;
          padding: 0 8px;
      }
      /* The page strip container the library creates. Allow programmatic
         scrollLeft (PageStrip uses scrollTo to keep the in-spread thumb
         centered) but hide the scrollbar so the overflow looks clean. */
      #strip-container > div {
          flex: 1;
          align-self: stretch;
          overflow-x: auto;
          scrollbar-width: none;        /* Firefox */
          display: flex;
          align-items: center;
          gap: 4px;
      }
      #strip-container > div::-webkit-scrollbar { display: none; }  /* WebKit */
      .strip-thumb {
          display: inline-flex;
          flex-direction: column;
          align-items: center;
          gap: 2px;
          cursor: pointer;
          flex: 0 0 auto;
      }
      .strip-thumb canvas {
          display: block;
          border: 1px solid #333;
      }
      .strip-thumb.in-spread canvas {
          border-color: #6af;
          box-shadow: 0 0 0 1px #6af;
      }
      .strip-thumb span {
          font-size: 10px;
          color: #777;
      }

    </style>
  </head>
  <body>
    <header>
      <label class="file-picker">
        <span>Open PDF</span>
        <input type="file" id="pdf-input" accept="application/pdf" />
      </label>
      <div id="page-jump">
        <input id="page-input" type="number" min="1" value="" />
        <span id="spread-readout">pages —</span>
      </div>
      <label class="demo-control">
        <input id="flyleaves-toggle" type="checkbox" checked />
        <span>Flyleaves</span>
      </label>
      <div class="zoom-controls">
        <button id="zoom-out" type="button">−</button>
        <button id="zoom-in" type="button">+</button>
      </div>
    </header>
    <div id="viewport"></div>
    <div id="strip-container"></div>
    <script type="importmap">
      {
          "imports": {
              "riffle": "./src/index.js"
          }
      }
    </script>
    <script type="module">
      import { Riffle, RifflePageStrip } from "riffle";

      const viewport = document.getElementById("viewport");
      const stripContainer = document.getElementById("strip-container");
      const flyleavesToggle = document.getElementById("flyleaves-toggle");
      const getFlyleavesOption = () => flyleavesToggle.checked ? { front: 1, back: 1 } : false;

      const viewer = Riffle({
          paperPreset: "natural",
          flyleaves: getFlyleavesOption(),
      });
      viewport.appendChild(viewer);
      stripContainer.appendChild(RifflePageStrip(viewer));

      const pageInput = document.getElementById("page-input");
      const spreadReadout = document.getElementById("spread-readout");

      const pageToSpread = (page) => viewer.spreadIndexForSourcePage(page - 1);
      const spreadToPage = (spread) => viewer.primarySourcePageIndexForSpread(spread) + 1;
      const pageLabel = (pageIndex) => {
          if (pageIndex < 0 || pageIndex >= viewer.bookViewer.book.pages.length) return null;
          const sourcePageIndex = viewer.pageIndexToSourcePageIndex(pageIndex);
          if (sourcePageIndex >= 0) return String(sourcePageIndex + 1);
          const role = viewer.bookViewer.book.pages[pageIndex]?.metadata?.source?.role;
          return role === "back" || role === "back-extra" ? "back" : "front";
      };
      const spreadLabel = (spread) => {
          const entries = viewer.bookViewer.book.spreadPageEntries(spread);
          const labels = [pageLabel(entries.left.pageIndex), pageLabel(entries.right.pageIndex)].filter(Boolean);
          return labels.length ? labels.join("-") : "-";
      };

      const refreshPageReadout = () => {
          const total = viewer.sourcePageCount();
          const hasVisiblePages = viewer.bookViewer.book.pages.length > 0;
          const label = hasVisiblePages ? spreadLabel(viewer.effectiveSpread) : "—";
          spreadReadout.textContent = total > 0
              ? `pages ${label} of ${total}`
              : "pages —";
          pageInput.disabled = total <= 0;
          pageInput.max = String(Math.max(1, total));
          if (document.activeElement !== pageInput) {
              pageInput.value = total > 0 ? String(spreadToPage(viewer.effectiveSpread)) : "";
          }
      };
      viewer.on("sourcechange", refreshPageReadout);
      viewer.on("spreadchange", refreshPageReadout);
      viewer.on("effectivespreadchange", refreshPageReadout);
      refreshPageReadout();

      pageInput.addEventListener("change", () => {
          const n = Number(pageInput.value);
          if (!Number.isFinite(n) || n < 1) return;
          const spread = pageToSpread(n);
          if (spread < 0) return;
          viewer.navigateTo(spread, viewer.sourcePageIndexToPageIndex(n - 1));
      });
      pageInput.addEventListener("keydown", (event) => {
          if (event.key === "Enter") pageInput.blur();
      });

      flyleavesToggle.addEventListener("change", () => {
          viewer.setFlyleaves(getFlyleavesOption());
          refreshPageReadout();
      });

      document.getElementById("pdf-input").addEventListener("change", async (event) => {
          const file = event.target.files?.[0];
          event.target.value = "";
          if (!file) return;
          try {
              await viewer.openPdf(file);
              refreshPageReadout();
          } catch (error) {
              console.error(error);
          }
      });

      document.getElementById("zoom-in").addEventListener("click", () => viewer.adjustZoom(1));
      document.getElementById("zoom-out").addEventListener("click", () => viewer.adjustZoom(-1));

      window.addEventListener("keydown", (event) => {
          if (event.target.tagName === "INPUT") return;
          if (event.key === "ArrowRight" || event.key === "ArrowDown") {
              viewer.navigateBy(1);
          } else if (event.key === "ArrowLeft" || event.key === "ArrowUp") {
              viewer.navigateBy(-1);
          }
      });

    </script>
  </body>
</html>
