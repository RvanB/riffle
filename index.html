<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Riffle — standalone PDF demo</title>
    <style>
      * { box-sizing: border-box; }
      html, body { margin: 0; padding: 0; height: 100%; }
      body {
          display: flex;
          flex-direction: column;
          font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
          background: #1e1e1e;
          color: #ddd;
      }
      header {
          display: flex;
          align-items: center;
          gap: 16px;
          padding: 10px 16px;
          background: #111;
          border-bottom: 1px solid #333;
      }
      .file-picker {
          display: inline-flex;
          align-items: center;
          gap: 8px;
          cursor: pointer;
          background: #2a2a2a;
          padding: 6px 12px;
          border-radius: 4px;
          border: 1px solid #444;
      }
      .file-picker input { display: none; }
      .file-picker:hover { background: #333; }
      #status { color: #888; font-size: 13px; }
      .zoom-controls { margin-left: auto; display: flex; gap: 4px; }
      .zoom-controls button {
          width: 32px; height: 32px;
          background: #2a2a2a; color: #ddd;
          border: 1px solid #444; border-radius: 4px;
          font-size: 18px; cursor: pointer;
      }
      .zoom-controls button:hover { background: #333; }

      /* This is the demo's choice of layout for the Riffle canvas + page strip. */
      #viewport {
          flex: 1;
          overflow: auto;
          display: flex;
          justify-content: center;
          align-items: center;
          padding: 32px;
      }
      #viewport canvas {
          box-shadow: 0 10px 24px rgba(0, 0, 0, 0.26);
      }
      #strip-container {
          flex: 0 0 64px;
          background: #161616;
          border-top: 1px solid #333;
          overflow-x: auto;
          display: flex;
          align-items: center;
          padding: 0 8px;
          gap: 4px;
      }
      #strip-container > div { /* the page strip container element */
          display: flex;
          align-items: center;
          gap: 4px;
      }
      .strip-thumb {
          display: inline-flex;
          flex-direction: column;
          align-items: center;
          gap: 2px;
          cursor: pointer;
          flex: 0 0 auto;
      }
      .strip-thumb canvas {
          display: block;
          border: 1px solid #333;
      }
      .strip-thumb.in-spread canvas {
          border-color: #6af;
          box-shadow: 0 0 0 1px #6af;
      }
      .strip-thumb span {
          font-size: 10px;
          color: #777;
      }

    </style>
  </head>
  <body>
    <header>
      <label class="file-picker">
        <span>Open PDF</span>
        <input type="file" id="pdf-input" accept="application/pdf" />
      </label>
      <span id="status"></span>
      <div class="zoom-controls">
        <button id="zoom-out" type="button">−</button>
        <button id="zoom-in" type="button">+</button>
      </div>
    </header>
    <div id="viewport"></div>
    <div id="strip-container"></div>
    <script type="module">
      import { Riffle, RifflePageStrip } from "https://cdn.jsdelivr.net/gh/RvanB/riffle@v0.1.1/dist/riffle.min.js";
  
      const viewport = document.getElementById("viewport");
      const stripContainer = document.getElementById("strip-container");
      const status = document.getElementById("status");

      const viewer = Riffle({ paperPreset: "natural" });
      viewport.appendChild(viewer);
      stripContainer.appendChild(RifflePageStrip(viewer));

      document.getElementById("pdf-input").addEventListener("change", async (event) => {
          const file = event.target.files?.[0];
          event.target.value = "";
          if (!file) return;
          status.textContent = `Loading ${file.name}…`;
          try {
              await viewer.openPdf(file);
              status.textContent = `${viewer.numSpreads * 2} pages loaded`;
          } catch (error) {
              console.error(error);
              status.textContent = `Failed: ${error.message}`;
          }
      });

      document.getElementById("zoom-in").addEventListener("click", () => viewer.adjustZoom(1));
      document.getElementById("zoom-out").addEventListener("click", () => viewer.adjustZoom(-1));

      window.addEventListener("keydown", (event) => {
          if (event.target.tagName === "INPUT") return;
          if (event.key === "ArrowRight" || event.key === "ArrowDown") {
              viewer.navigateTo(viewer.currentSpread + 1);
          } else if (event.key === "ArrowLeft" || event.key === "ArrowUp") {
              viewer.navigateTo(viewer.currentSpread - 1);
          }
      });

      status.textContent = "Choose a PDF to begin.";

    </script>
  </body>
</html>
