<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>book-viewer — standalone PDF demo</title>
  <link rel="stylesheet" href="examples/standalone.css" />
</head>
<body>
  <header>
    <label class="file-picker">
      <span>Open PDF</span>
      <input type="file" id="pdf-input" accept="application/pdf" />
    </label>
    <span id="status"></span>
    <div class="zoom-controls">
      <button id="zoom-out" type="button">−</button>
      <button id="zoom-in" type="button">+</button>
    </div>
  </header>
  <main>
    <div id="canvas-area">
      <div id="canvas-area-inner">
        <div id="canvas-wrap">
          <div id="canvas-stage">
            <canvas id="spread-canvas" width="0" height="0"></canvas>
          </div>
        </div>
      </div>
    </div>
    <div id="page-strip"></div>
  </main>
  <script type="module" src="examples/standalone.js"></script>
</body>
</html>
